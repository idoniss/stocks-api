name: Deploy to Cloud Run

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t us-central1-docker.pkg.dev/calculator-api-proj/cloud-run-source-deploy/calculator-api .

      - name: Push Docker image
        run: |
          docker push us-central1-docker.pkg.dev/calculator-api-proj/cloud-run-source-deploy/calculator-api

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy calculator-api --image=us-central1-docker.pkg.dev/calculator-api-proj/cloud-run-source-deploy/calculator-api --region=us-central1 --platform=managed --allow-unauthenticated --min-instances=0 --port=8080
